<article class="card">
  <a class="listing-link" href="{{LISTING_URL}}">
    <img class="vehicle-image" src="{{IMAGE_URL}}" alt="{{IMAGE_ALT}}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/960x640?text=BMW+Listing';" />
    <div class="row">
      <h3>{{YEAR}} BMW {{MODEL}}</h3>
      <span class="price">{{PRICE}}</span>
    </div>
    <p class="meta"><strong>Trim:</strong> {{TRIM}}</p>
    <p class="meta"><strong>Body Style:</strong> {{BODY_STYLE}}</p>
    <p class="meta"><strong>Drive Type:</strong> {{DRIVE_TYPE}}</p>
    <p class="meta">{{LOCATION}} | {{MILEAGE}} miles</p>
    <p class="meta">Seller: {{SELLER_NAME}} ({{SELLER_TYPE}})</p>
    <div class="tags">
      <span class="tag">{{STATUS}}</span>
      <span class="tag"><strong>Title:</strong> {{TITLE_TYPE}}</span>
      <span class="tag"><strong>VIN:</strong> {{VIN}}</span>
      <span class="tag">Listing ID: {{LISTING_ID}}</span>
    </div>
  </a>
  {{VEHICLE_REPORTS_HTML}}
</article>
