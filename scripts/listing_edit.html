<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Listing | BMW Marketplace</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page-shell form-shell">
    <a class="back-link" href="/listing?listing_id={{LISTING_ID}}">Back to listing</a>

    <section class="form-hero">
      <p class="eyebrow">Seller Tools</p>
      <h1>Edit your listing</h1>
      <p class="sub">Update the listing details and photos here. Quick actions like pending, sold, and delete stay on the listing page.</p>
    </section>

    {{ERROR_HTML}}

    <form class="listing-form" action="/edit-listing" method="post" enctype="multipart/form-data">
      <input type="hidden" name="listing_id" value="{{LISTING_ID}}" />

      <div class="form-grid">
        <label>Year<input type="number" name="year" min="1970" max="2035" value="{{YEAR}}" /></label>
        <label>Model<input type="text" name="model" value="{{MODEL}}" /></label>
        <label>Trim<input type="text" name="trim" value="{{TRIM}}" /></label>
        <label>VIN<input type="text" name="vin" maxlength="17" value="{{VIN}}" /></label>
      </div>

      <div class="form-grid">
        <label>Seller type
          <select name="seller_type">
            <option value="PRIVATE_SELLER" {{PRIVATE_SELECTED}}>Private Seller</option>
            <option value="DEALER" {{DEALER_SELECTED}}>Dealer</option>
          </select>
        </label>
        <label>Status
          <select name="status">
            <option value="ACTIVE" {{ACTIVE_SELECTED}}>Active</option>
            <option value="PAUSED" {{PAUSED_SELECTED}}>Paused</option>
            <option value="PENDING" {{PENDING_SELECTED}}>Pending</option>
            <option value="SOLD" {{SOLD_SELECTED}}>Sold</option>
          </select>
        </label>
        <label>Price (USD)*<input type="number" name="price" min="1000" step="1" value="{{PRICE}}" required /></label>
        <label>Mileage*<input type="number" name="mileage" min="0" step="1" value="{{MILEAGE}}" required /></label>
        <label>Location*<input type="text" name="location" value="{{LOCATION}}" required /></label>
        <label>Body style<input type="text" name="body_style" value="{{BODY_STYLE}}" /></label>
        <label>Drive type<input type="text" name="drive_type" value="{{DRIVE_TYPE}}" /></label>
        <label>Title type<input type="text" name="title_type" value="{{TITLE_TYPE}}" /></label>
      </div>

      <label>Primary image file (optional)
        <input type="file" name="primary_image" accept="image/*" />
      </label>
      <label>Gallery image files (optional, multiple)
        <input type="file" name="gallery_images_files" accept="image/*" multiple />
      </label>
      <label>Existing gallery URLs (comma-separated)
        <textarea name="gallery_images" rows="2">{{GALLERY_IMAGES}}</textarea>
      </label>
      <label>Description
        <textarea name="description" rows="6">{{DESCRIPTION}}</textarea>
      </label>

      <button class="button primary" type="submit">Save changes</button>
    </form>
  </main>
</body>
</html>
