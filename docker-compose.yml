services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bmw_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bmw_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 8
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bmw_marketplace
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/app/scripts
      - ./data:/app/data

volumes:
  pg_data:
